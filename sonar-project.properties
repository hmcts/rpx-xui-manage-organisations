sonar.projectKey=rpx-xui-manage-organisations
sonar.projectName=rpx-xui-manage-organisations
sonar.projectVersion=0.0.1
sonar.host.url=https://sonarcloud.io

sonar.sources=src
sonar.test.inclusions=src/**/*.spec.ts
sonar.exclusions=test/**,config/**,api/**/templates/**,src/public/**,src/environments/**,**/*.html,**/*.scss,src/app/app.constants.ts,src/app/utils/app-utils.ts,src/app/services/appInsightsWrapper.ts
sonar.coverage.exclusions=src/cases/**,src/caa-cases/**,src/organisation/store/**,src/assets/**,src/style-guide/**,src/karma.conf.js
sonar.cpd.exclusions=src/cases/**,src/caa-cases/**

sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S1226
sonar.issue.ignore.multicriteria.e1.resourceKey=src/cases/store/effects/share-case.effects.ts
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S1874
sonar.issue.ignore.multicriteria.e2.resourceKey=src/app/app.module.ts

sonar.javascript.lcov.reportPaths=reports/tests/coverage/ng/lcov-report/lcov.info
# Keep JRE provisioning enabled so the Sonar scanner can use a supported Java runtime.
sonar.scanner.skipJreProvisioning=false
