<app-hmcts-main-wrapper
  [summaryErrors]="combinedErrors$ | async"
  [backLink]="backUrl"
  [title]="'Manage user'"
  [showWarningMessage]="showWarningMessage"
>
  <app-user-personal-details
    #userPersonalDetails
    [user]="user"
    (personalDetailsChanged)="onPersonalDetailsChange($event)"
  ></app-user-personal-details>
  <div class="govuk-form-group" [class.govuk-form-group--error]="standardPermission?.errors.basicPermissions.length > 0">
    @if (standardPermission?.errors.basicPermissions.length > 0) {
    <p id="permissions-error" class="govuk-error-message">
      <span class="govuk-visually-hidden">Error:</span> You must select at least
      one action
    </p>
    }
    <app-standard-user-permissions
      #standardPermission
      [user]="user"
      [hasOrganisationAccessPermission]="hasOrganisationAccessPermission"
      [showPermissionError]="false"
      (selectedPermissionsChanged)="onStandardUserPermissionsChange($event)"
    ></app-standard-user-permissions>
    <app-organisation-access-permissions
      [jurisdictions]="jurisdictions"
      [user]="user"
      [organisationProfileIds]="organisationProfileIds"
      (selectedPermissionsChanged)="
        onSelectedCaseManagamentPermissionsChange($event)
      "
    ></app-organisation-access-permissions>
  </div>

  <div class="govuk-button-group">
    <button
      id="saveUserBtn"
      type="button"
      data-prevent-double-click="true"
      class="govuk-button"
      data-module="govuk-button"
      aria-label="Submit"
      (click)="onSubmit()"
    >
      Submit
    </button>
    <a class="govuk-link" [routerLink]="backUrl"
      >Cancel
      <span class="govuk-visually-hidden">{{
        "and go back" | rpxTranslate
      }}</span></a
    >
  </div>
</app-hmcts-main-wrapper>
